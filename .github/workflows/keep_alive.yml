name: Keep Hugging Face Space Awake

on:
  schedule:
    # This runs at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch: # This allows you to run it manually to test it

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Send a ping to Hugging Face
        run: |
          curl -I https://huggingface.co/spaces/SoftChinchilla/Minecraft-Seed-Finder
